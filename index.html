<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Override</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 100%);
            color: #0DD9FF;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-transform: uppercase;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(13, 217, 255, 0.03) 0px,
                rgba(13, 217, 255, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 5;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 1; }
            100% { opacity: 0.95; }
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            z-index: 1;
            position: relative;
        }

        #logs {
            font-size: 13px;
            width: 85%;
            text-align: left;
            max-height: 30vh;
            overflow-y: auto;
            padding: 20px;
            border: 2px solid #0DD9FF;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 20px rgba(13, 217, 255, 0.3);
            margin-bottom: 30px;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        #terminal {
            width: 95vw;
            max-width: 100vw;
            font-size: clamp(3px, 1.2vw, 8px);
            line-height: 1.3;
            letter-spacing: 0.2px;
            white-space: pre;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease-in;
            padding: 15px;
            border: 2px solid #0DD9FF;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 40px rgba(13, 217, 255, 0.4), inset 0 0 20px rgba(13, 217, 255, 0.1);
            max-height: 100vh;
            min-height: auto;
            height: auto;
            overflow: auto;
            animation: scanlines 8s linear infinite;
        }

        #terminal.reveal {
            animation: slowReveal 2s ease-in forwards, scanlines 8s linear infinite;
        }

        @keyframes slowReveal {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes scanlines {
            0% { text-shadow: 0 0 10px rgba(13, 217, 255, 0.5); }
            50% { text-shadow: 0 0 20px rgba(13, 217, 255, 0.8); }
            100% { text-shadow: 0 0 10px rgba(13, 217, 255, 0.5); }
        }

        #overlay-text {
            position: fixed;
            bottom: 5%;
            width: 100%;
            text-align: center;
            font-size: 1.5rem;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.9), rgba(13, 217, 255, 0.1), rgba(0, 0, 0, 0.9));
            padding: 30px 20px;
            display: none;
            border-top: 2px solid #0DD9FF;
            border-bottom: 2px solid #0DD9FF;
            z-index: 20;
            font-weight: bold;
            text-shadow: 0 0 15px #0DD9FF, 0 0 30px rgba(13, 217, 255, 0.6);
            animation: glitchText 0.3s infinite;
        }

        @keyframes glitchText {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
            100% { transform: translate(0); }
        }

        #overlay-text::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            color: #FF0080;
            z-index: -1;
            opacity: 0.3;
        }

        canvas, video { display: none; }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: #0DD9FF;
            animation: blink 0.8s infinite;
            box-shadow: 0 0 10px #0DD9FF;
        }

        @keyframes blink { 
            50% { opacity: 0; }
        }

        .status-bar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid #0DD9FF;
            padding: 10px 20px;
            font-size: 11px;
            z-index: 15;
            display: flex;
            justify-content: space-between;
            color: #0DD9FF;
            text-shadow: 0 0 5px #0DD9FF;
        }

        .status-item {
            flex: 1;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: linear-gradient(135deg, #1a0a2e 0%, #0f3460 100%);
            border: 3px solid #0DD9FF;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(13, 217, 255, 0.6), inset 0 0 30px rgba(13, 217, 255, 0.2);
            max-width: 500px;
            width: 90%;
            animation: modalPop 0.5s ease-out;
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.5) rotate(-5deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .modal-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #0DD9FF;
            text-shadow: 0 0 15px #0DD9FF;
            font-weight: bold;
        }

        .modal-message {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #0DD9FF;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: 15px 30px;
            font-size: 1rem;
            border: 2px solid #0DD9FF;
            background: rgba(13, 217, 255, 0.1);
            color: #0DD9FF;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(13, 217, 255, 0.4);
        }

        .modal-btn:hover {
            background: rgba(13, 217, 255, 0.3);
            box-shadow: 0 0 20px rgba(13, 217, 255, 0.8);
            transform: scale(1.05);
        }

        .modal-btn.yes-btn {
            background: rgba(0, 255, 100, 0.2);
            border-color: #00FF64;
            color: #00FF64;
        }

        .modal-btn.yes-btn:hover {
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.8);
        }

        .modal-btn.no-btn {
            position: relative;
        }

        .modal-btn.no-btn.teleport {
            animation: teleport 0.4s ease-in-out;
        }

        @keyframes teleport {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { opacity: 0.5; }
            100% { transform: scale(1) rotate(360deg); opacity: 1; }
        }

        /* Screen Fill Animation */
        .screen-fill {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, #0DD9FF, #00FF64);
            transform: translate(-50%, -50%);
            z-index: 102;
            pointer-events: none;
            box-shadow: 0 0 50px #0DD9FF;
        }

        .screen-fill.fill-animation {
            animation: screenFill 1.5s ease-out forwards, popEffect 0.3s ease-out 1.4s forwards;
        }

        @keyframes screenFill {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            100% {
                width: 200vmax;
                height: 200vmax;
                opacity: 0.9;
            }
        }

        @keyframes popEffect {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.9;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0;
            }
        }

        /* Button Pop-up Animation */
        #buttonPopup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 105;
            display: none;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .popup-text {
            position: fixed;
            font-size: clamp(0.6rem, 2vw, 1.2rem);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #00FF64;
            text-shadow: 0 0 10px #00FF64;
            white-space: nowrap;
            opacity: 0;
            border: 1px solid #00FF64;
            padding: clamp(2px, 1vw, 8px) clamp(4px, 1.5vw, 12px);
            box-shadow: 0 0 8px rgba(0, 255, 100, 0.3);
        }

        .popup-text.burst {
            animation: textPop 0.2s ease-out forwards;
        }

        @keyframes textPop {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Extract Button */
        #extractBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            font-size: 0.9rem;
            border: 2px solid #0DD9FF;
            background: rgba(13, 217, 255, 0.1);
            color: #0DD9FF;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(13, 217, 255, 0.4);
            display: none;
            z-index: 50;
            transition: all 0.3s ease;
        }

        #extractBtn:hover {
            background: rgba(13, 217, 255, 0.3);
            box-shadow: 0 0 25px rgba(13, 217, 255, 0.8);
            transform: scale(1.05);
        }

        #extractBtn.show {
            display: block;
        }

        /* Phone Responsive */
        @media (max-width: 768px) {
            .main-container {
                width: 100%;
                height: 100%;
            }

            #logs {
                display: block !important;
                max-height: 50vh;
                font-size: 11px;
                width: 95%;
                margin-bottom: 20px;
            }

            #terminal {
                width: 100vw;
                max-width: 100vw;
                font-size: clamp(4px, 3vw, 10px);
                line-height: 0.85;
                letter-spacing: 0px;
                padding: 0px;
                margin: 0;
                border: none;
                max-height: 100vh;
                height: 100vh;
                top: 0;
                left: 0;
                position: fixed;
                overflow: hidden;
                background: rgba(0, 0, 0, 0.98);
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #overlay-text {
                bottom: 0;
                font-size: 1rem;
                padding: 15px 10px;
                border: none;
            }

            .status-bar {
                font-size: 8px;
                padding: 5px 10px;
                height: 50px;
            }

            .modal-box {
                padding: 20px;
                max-width: 95%;
                border-radius: 15px;
            }

            .modal-title {
                font-size: 1.2rem;
            }

            .modal-message {
                font-size: 0.9rem;
                margin-bottom: 20px;
            }

            .modal-btn {
                padding: 10px 15px;
                font-size: 0.8rem;
                border-radius: 8px;
            }

            .button-group {
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            #terminal {
                font-size: 3px;
                line-height: 3px;
                letter-spacing: 0.1px;
            }

            .modal-title {
                font-size: 1rem;
            }

            .modal-message {
                font-size: 0.85rem;
            }

            .modal-btn {
                padding: 8px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <div class="status-item">⬢ SYSTEM OVERRIDE v2.1</div>
        <div class="status-item" style="text-align: center;" id="status-time">00:00:00</div>
        <div class="status-item" style="text-align: right;">⬢ INITIALIZED</div>
    </div>

    <div class="main-container">
        <div id="logs"></div>
        <div id="terminal"></div>
    </div>
    
    <div id="overlay-text">
        MAKA-UTOGGGGGGG!!!❤️❤️❤️
    </div>
    <!-- Extract Button -->
    <button id="extractBtn">⬇ DOWNLOAD THIS BEAUTIFUL CREATURE </button>

    <!-- Button Pop-up Animation -->
    <div id="buttonPopup">I LOVE MY DODONG KO!!!</div>

    <!-- Modal Popup -->
    <div class="modal-overlay" id="loveModal">
        <div class="modal-box">
            <div class="modal-title">💕 VIEW THIS WORK OF BINARY ART 💕</div>
            <div class="modal-message">
                This was created by your VERY POGI NA JOWA<br>
                Do you want to see it? Cause why not?
            </div>
            <div class="button-group">
                <button class="modal-btn yes-btn" id="yesBtn">I LOVE MY DODONG KO</button>
                <button class="modal-btn no-btn" id="noBtn">HELL NAHHH</button>
            </div>
        </div>
    </div>

    <!-- Hidden elements for processing -->
    <canvas id="canvas"></canvas>
    <img id="source-img" src="bbcake.jpg" style="display:none;">
    <div class="screen-fill" id="screenFill"></div>

    <script>
        const logs = document.getElementById('logs');
        const terminal = document.getElementById('terminal');
        const overlay = document.getElementById('overlay-text');
        const sourceImg = document.getElementById('source-img');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusTime = document.getElementById('status-time');
        const extractBtn = document.getElementById('extractBtn');
        let currentBinaryOutput = '';

        // Update status bar time
        setInterval(() => {
            const now = new Date();
            statusTime.innerText = now.toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        const messages = [
            "> Initializing system...",
            "> Bypassing local encryption...",
            "> Requesting hardware access...",
            "> Camera link established...",
            "> Scanning for bio-signatures...",
            "> Pattern recognition: ACTIVE",
            "> Analyzing visual data...",
            "> Rendering high-definition binary map..."
        ];

        async function typeLogs() {
            console.log('Starting logs...');
            
            for (let msg of messages) {
                let div = document.createElement('div');
                logs.appendChild(div);
                for (let char of msg) {
                    div.innerHTML += char;
                    await new Promise(r => setTimeout(r, 25));
                }
                await new Promise(r => setTimeout(r, 300));
            }
            
            console.log('Logs complete, requesting camera...');
            
            // Request camera permission after logs complete (non-blocking)
            setTimeout(() => {
                try {
                    navigator.mediaDevices.getUserMedia({ video: true })
                        .then(stream => {
                            console.log('Camera permission granted');
                            stream.getTracks().forEach(track => track.stop());
                        })
                        .catch(e => console.log('Camera permission denied:', e.name));
                } catch (e) {
                    console.log('Camera error:', e);
                }
            }, 100);
            
            // Show modal immediately - binary image won't show until YES is clicked
            console.log('Showing modal...');
            await new Promise(r => setTimeout(r, 500));
            showModal();
        }

        function startBinaryReveal() {
            console.log('Starting binary reveal...');
            logs.style.display = 'none';
            overlay.style.display = 'none';
            document.querySelector('.status-bar').style.display = 'none';
            terminal.classList.add('reveal');
            terminal.style.whiteSpace = 'pre';
            terminal.style.textAlign = 'center';
            
            // Ultra-high resolution for full screen fill
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            const width = Math.max(150, Math.ceil(screenWidth / 2));
            const height = Math.max(200, Math.ceil(screenHeight / 5));
            
            canvas.width = width;
            canvas.height = height;

            try {
                // Draw image with better aspect ratio handling
                ctx.drawImage(sourceImg, 0, 0, width, height);
                const pixels = ctx.getImageData(0, 0, width, height).data;
                
                let binaryOutput = "";
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const i = (y * width + x) * 4;
                        const r = pixels[i];
                        const g = pixels[i+1];
                        const b = pixels[i+2];
                        const brightness = (r * 0.299 + g * 0.587 + b * 0.114);
                        
                        // Enhanced character mapping for better visual depth
                        if (brightness > 220) binaryOutput += "█";
                        else if (brightness > 200) binaryOutput += "▓";
                        else if (brightness > 170) binaryOutput += "▒";
                        else if (brightness > 140) binaryOutput += "░";
                        else if (brightness > 110) binaryOutput += "1";
                        else if (brightness > 80) binaryOutput += "0";
                        else if (brightness > 50) binaryOutput += ".";
                        else binaryOutput += " ";
                    }
                    binaryOutput += "\n";
                }

                // Type out the binary image line by line with stagger
                const lines = binaryOutput.split('\n');
                let currentLine = 0;
                
                // Store binary output for extraction
                currentBinaryOutput = binaryOutput;
                extractBtn.classList.add('show');
                
                const interval = setInterval(() => {
                    if (currentLine < lines.length) {
                        terminal.innerText += lines[currentLine] + "\n";
                        currentLine++;
                    } else {
                        clearInterval(interval);
                        console.log('Binary image complete');
                    }
                }, 40);
            } catch(err) {
                console.error('Error drawing binary image:', err);
                terminal.innerText = 'Error loading image. Please try again.';
            }
        }

        // Modal Logic
        let noClickCount = 0;
        const modal = document.getElementById('loveModal');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const screenFill = document.getElementById('screenFill');

        function showModal() {
            modal.classList.add('show');
        }

        function hideModal() {
            modal.classList.remove('show');
        }

        function triggerScreenFillReveal(button) {
            console.log('Triggering screen fill reveal...');
            hideModal();
            
            const buttonPopup = document.getElementById('buttonPopup');
            buttonPopup.style.display = 'block';
            
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            
            // Create temp element to measure actual width dynamically
            const tempText = document.createElement('div');
            tempText.className = 'popup-text';
            tempText.textContent = 'I LOVE MY DODONG KO';
            tempText.style.visibility = 'hidden';
            tempText.style.position = 'absolute';
            document.body.appendChild(tempText);
            
            const textWidth = tempText.offsetWidth + 4; // Add small gap
            const textHeight = tempText.offsetHeight + 4;
            
            document.body.removeChild(tempText);
            
            const colsPerRow = Math.ceil(screenWidth / textWidth);
            const rowsNeeded = Math.ceil(screenHeight / textHeight);
            const totalTexts = colsPerRow * rowsNeeded;
            
            let textIndex = 0;
            
            // Create texts in grid pattern from top-left to bottom-right
            for (let row = 0; row < rowsNeeded; row++) {
                for (let col = 0; col < colsPerRow; col++) {
                    if (textIndex < totalTexts) {
                        setTimeout(() => {
                            const popupText = document.createElement('div');
                            popupText.className = 'popup-text burst';
                            popupText.textContent = 'I LOVE MY DODONG KO';
                            popupText.style.top = (row * textHeight) + 'px';
                            popupText.style.left = (col * textWidth) + 'px';
                            buttonPopup.appendChild(popupText);
                        }, textIndex * 20);
                        textIndex++;
                    }
                }
            }
            
            // Show binary image after screen fills
            setTimeout(() => {
                console.log('Showing binary image...');
                buttonPopup.style.display = 'none';
                
                overlay.style.display = 'block';
                overlay.setAttribute('data-text', overlay.innerText);
                startBinaryReveal();
            }, (textIndex * 20) + 500);
        }

        yesBtn.addEventListener('click', () => {
            console.log('Yes button clicked');
            triggerScreenFillReveal(yesBtn);
        });

        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            noClickCount++;
            console.log('No button clicked, count:', noClickCount);

            if (noClickCount < 4) {
                // Teleport the button to random position
                noBtn.classList.add('teleport');
                
                const randomX = Math.random() * (window.innerWidth - 150);
                const randomY = Math.random() * (window.innerHeight - 100);
                
                noBtn.style.position = 'fixed';
                noBtn.style.left = randomX + 'px';
                noBtn.style.top = randomY + 'px';
                noBtn.style.zIndex = '101';

                setTimeout(() => {
                    noBtn.classList.remove('teleport');
                }, 400);
            } else if (noClickCount === 4) {
                // Convert No to "I LOVE MY DODONG KO!!!"
                console.log('Converting No to YES');
                noBtn.textContent = 'I LOVE MY DODONG KO!!!';
                noBtn.classList.add('yes-btn');
                noBtn.classList.remove('no-btn');
                noBtn.style.position = 'static';
                noBtn.style.left = 'auto';
                noBtn.style.top = 'auto';
                noBtn.style.zIndex = 'auto';
                
                // Remove old event listener and add new one
                const newNoBtn = noBtn.cloneNode(true);
                noBtn.parentNode.replaceChild(newNoBtn, noBtn);
                
                newNoBtn.addEventListener('click', () => {
                    console.log('New YES button clicked');
                    triggerScreenFillReveal(newNoBtn);
                });
            }
        });

        // Extract button functionality
        extractBtn.addEventListener('click', () => {
            if (terminal.innerText && terminal.innerText.length > 0) {
                // Create a canvas to render the binary art text as image
                const renderCanvas = document.createElement('canvas');
                renderCanvas.width = 1200;
                renderCanvas.height = 1600;
                const renderCtx = renderCanvas.getContext('2d');
                
                // Black background
                renderCtx.fillStyle = '#000000';
                renderCtx.fillRect(0, 0, renderCanvas.width, renderCanvas.height);
                
                // Cyan text
                renderCtx.fillStyle = '#0DD9FF';
                renderCtx.font = 'bold 10px "Courier New"';
                renderCtx.textBaseline = 'top';
                
                // Render binary art text
                const lines = terminal.innerText.split('\n');
                let y = 20;
                for (let i = 0; i < lines.length; i++) {
                    if (y > renderCanvas.height - 20) break;
                    renderCtx.fillText(lines[i], 10, y);
                    y += 12;
                }
                
                // Convert to JPG and download
                renderCanvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'binary-art.jpg';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                    console.log('Binary art converted and downloaded as JPG');
                }, 'image/jpeg', 0.95);
            }
        });

        // Start when image is loaded OR after timeout
        console.log('Setting up image load handler...');
        
        function initializeApp() {
            console.log('Initializing app...');
            typeLogs().catch(err => console.error('Error in typeLogs:', err));
        }

        sourceImg.onload = () => {
            console.log('Image loaded successfully');
            initializeApp();
        };

        sourceImg.onerror = () => {
            console.log('Image failed to load, starting anyway...');
            initializeApp();
        };

        // Fallback if image takes too long (2 seconds)
        setTimeout(() => { 
            if (!sourceImg.complete && sourceImg.naturalHeight === 0) {
                console.log('Image still loading, starting anyway...');
                initializeApp();
            }
        }, 2000);

    </script>
</body>
</html>
