<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Override</title>
    <style>
        body {
            background-color: black;
            color: #00FF41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-transform: uppercase;
        }

        #terminal {
            width: 100%;
            font-size: 8px; /* Small font for high detail binary */
            line-height: 7px;
            letter-spacing: 1px;
            white-space: pre;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease-in;
        }

        #logs {
            font-size: 14px;
            width: 80%;
            text-align: left;
        }

        #overlay-text {
            position: fixed;
            bottom: 10%;
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 0;
            display: none;
            border-top: 1px solid #00FF41;
            z-index: 10;
        }

        canvas, video { display: none; }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: #00FF41;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="logs"></div>
    <div id="terminal"></div>
    <div id="overlay-text">
        TESTING-TESING!! HALLO MA BBCAKE!! HART KA SAKIN❤️❤️❤️
    </div>

    <!-- Hidden elements for processing -->
    <canvas id="canvas"></canvas>
    <img id="source-img" src="us.jpg" style="display:none;">

    <script>
        const logs = document.getElementById('logs');
        const terminal = document.getElementById('terminal');
        const overlay = document.getElementById('overlay-text');
        const sourceImg = document.getElementById('source-img');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const messages = [
            "> Initializing system...",
            "> Bypassing local encryption...",
            "> Requesting hardware access...",
            "> Camera link established...",
            "> Scanning for bio-signatures...",
            "> Pattern recognition: ACTIVE",
            "> Analyzing visual data...",
            "> Rendering high-definition binary map..."
        ];

        async function typeLogs() {
            for (let msg of messages) {
                let div = document.createElement('div');
                logs.appendChild(div);
                for (let char of msg) {
                    div.innerHTML += char;
                    await new Promise(r => setTimeout(r, 30));
                }
                await new Promise(r => setTimeout(r, 400));
            }
            
            // Trigger Camera Request for realism
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                startBinaryReveal();
            } catch (e) {
                // If she denies camera, show it anyway!
                startBinaryReveal();
            }
        }

        function startBinaryReveal() {
            logs.style.display = 'none';
            terminal.style.opacity = '1';
            
            // Set resolution for the binary art
            const width = 80; 
            const height = 60;
            canvas.width = width;
            canvas.height = height;

            // Draw image to canvas to get pixel data
            ctx.drawImage(sourceImg, 0, 0, width, height);
            const pixels = ctx.getImageData(0, 0, width, height).data;
            
            let binaryOutput = "";
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const brightness = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                    // Use different characters for depth
                    if (brightness > 200) binaryOutput += "1";
                    else if (brightness > 140) binaryOutput += "0";
                    else if (brightness > 80) binaryOutput += ".";
                    else binaryOutput += " ";
                }
                binaryOutput += "\n";
            }

            // Type out the binary image line by line
            const lines = binaryOutput.split('\n');
            let currentLine = 0;
            
            const interval = setInterval(() => {
                if (currentLine < lines.length) {
                    terminal.innerText += lines[currentLine] + "\n";
                    window.scrollTo(0, document.body.scrollHeight);
                    currentLine++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        overlay.style.display = 'block';
                    }, 1000);
                }
            }, 50);
        }

        // Start when image is loaded
        sourceImg.onload = () => {
            typeLogs();
        };

        // Fallback if image takes too long
        setTimeout(() => { if(logs.innerHTML === "") typeLogs(); }, 3000);

    </script>
</body>
</html>
