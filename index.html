<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Override</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 100%);
            color: #00FF41;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-transform: uppercase;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 65, 0.03) 0px,
                rgba(0, 255, 65, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 5;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 1; }
            100% { opacity: 0.95; }
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            z-index: 1;
            position: relative;
        }

        #logs {
            font-size: 13px;
            width: 85%;
            text-align: left;
            max-height: 30vh;
            overflow-y: auto;
            padding: 20px;
            border: 2px solid #00FF41;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            margin-bottom: 30px;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        #terminal {
            width: 90%;
            max-width: 900px;
            font-size: 6px;
            line-height: 6px;
            letter-spacing: 0.5px;
            white-space: pre;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease-in;
            padding: 20px;
            border: 2px solid #00FF41;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.4), inset 0 0 20px rgba(0, 255, 65, 0.1);
            max-height: 70vh;
            overflow-y: auto;
            animation: scanlines 8s linear infinite;
        }

        @keyframes scanlines {
            0% { text-shadow: 0 0 10px rgba(0, 255, 65, 0.5); }
            50% { text-shadow: 0 0 20px rgba(0, 255, 65, 0.8); }
            100% { text-shadow: 0 0 10px rgba(0, 255, 65, 0.5); }
        }

        #terminal::-webkit-scrollbar {
            width: 8px;
        }

        #terminal::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        #terminal::-webkit-scrollbar-thumb {
            background: #00FF41;
            border-radius: 4px;
        }

        #overlay-text {
            position: fixed;
            bottom: 5%;
            width: 100%;
            text-align: center;
            font-size: 1.5rem;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.9), rgba(0, 255, 65, 0.1), rgba(0, 0, 0, 0.9));
            padding: 30px 20px;
            display: none;
            border-top: 2px solid #00FF41;
            border-bottom: 2px solid #00FF41;
            z-index: 20;
            font-weight: bold;
            text-shadow: 0 0 15px #00FF41, 0 0 30px rgba(0, 255, 65, 0.6);
            animation: glitchText 0.3s infinite;
        }

        @keyframes glitchText {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
            100% { transform: translate(0); }
        }

        #overlay-text::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            color: #FF0080;
            z-index: -1;
            opacity: 0.3;
        }

        canvas, video { display: none; }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: #00FF41;
            animation: blink 0.8s infinite;
            box-shadow: 0 0 10px #00FF41;
        }

        @keyframes blink { 
            50% { opacity: 0; }
        }

        .status-bar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid #00FF41;
            padding: 10px 20px;
            font-size: 11px;
            z-index: 15;
            display: flex;
            justify-content: space-between;
            color: #00FF41;
            text-shadow: 0 0 5px #00FF41;
        }

        .status-item {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <div class="status-item">⬢ SYSTEM OVERRIDE v2.1</div>
        <div class="status-item" style="text-align: center;" id="status-time">00:00:00</div>
        <div class="status-item" style="text-align: right;">⬢ INITIALIZED</div>
    </div>

    <div class="main-container">
        <div id="logs"></div>
        <div id="terminal"></div>
    </div>
    
    <div id="overlay-text">
        MAKA-UTOGGGGGGG!!!❤️❤️❤️
    </div>

    <!-- Hidden elements for processing -->
    <canvas id="canvas"></canvas>
    <img id="source-img" src="bbcake.jpg" style="display:none;">

    <script>
        const logs = document.getElementById('logs');
        const terminal = document.getElementById('terminal');
        const overlay = document.getElementById('overlay-text');
        const sourceImg = document.getElementById('source-img');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusTime = document.getElementById('status-time');

        // Update status bar time
        setInterval(() => {
            const now = new Date();
            statusTime.innerText = now.toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        const messages = [
            "> Initializing system...",
            "> Bypassing local encryption...",
            "> Requesting hardware access...",
            "> Camera link established...",
            "> Scanning for bio-signatures...",
            "> Pattern recognition: ACTIVE",
            "> Analyzing visual data...",
            "> Rendering high-definition binary map..."
        ];

        async function typeLogs() {
            for (let msg of messages) {
                let div = document.createElement('div');
                logs.appendChild(div);
                for (let char of msg) {
                    div.innerHTML += char;
                    await new Promise(r => setTimeout(r, 25));
                }
                await new Promise(r => setTimeout(r, 300));
            }
            
            // Trigger Camera Request for realism
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                startBinaryReveal();
            } catch (e) {
                // If denied, show it anyway!
                startBinaryReveal();
            }
        }

        function startBinaryReveal() {
            logs.style.display = 'none';
            terminal.style.opacity = '1';
            
            // Increased resolution for better detail
            const width = 100; 
            const height = 80;
            canvas.width = width;
            canvas.height = height;

            // Draw image with better aspect ratio handling
            ctx.drawImage(sourceImg, 0, 0, width, height);
            const pixels = ctx.getImageData(0, 0, width, height).data;
            
            let binaryOutput = "";
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const r = pixels[i];
                    const g = pixels[i+1];
                    const b = pixels[i+2];
                    const brightness = (r * 0.299 + g * 0.587 + b * 0.114);
                    
                    // Enhanced character mapping for better visual depth
                    if (brightness > 220) binaryOutput += "█";
                    else if (brightness > 200) binaryOutput += "▓";
                    else if (brightness > 170) binaryOutput += "▒";
                    else if (brightness > 140) binaryOutput += "░";
                    else if (brightness > 110) binaryOutput += "1";
                    else if (brightness > 80) binaryOutput += "0";
                    else if (brightness > 50) binaryOutput += ".";
                    else binaryOutput += " ";
                }
                binaryOutput += "\n";
            }

            // Type out the binary image line by line with stagger
            const lines = binaryOutput.split('\n');
            let currentLine = 0;
            
            const interval = setInterval(() => {
                if (currentLine < lines.length) {
                    terminal.innerText += lines[currentLine] + "\n";
                    // Auto-scroll
                    terminal.scrollTop = terminal.scrollHeight;
                    currentLine++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        overlay.style.display = 'block';
                        overlay.setAttribute('data-text', overlay.innerText);
                    }, 800);
                }
            }, 40);
        }

        // Start when image is loaded
        sourceImg.onload = () => {
            typeLogs();
        };

        // Fallback if image takes too long
        setTimeout(() => { if(logs.innerHTML === "") typeLogs(); }, 3000);

    </script>
</body>
</html>
